<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>H&N Games Hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0b1220;
  --card:#1e293b;
  --text:#e2e8f0;
  --accent:#38bdf8;
  --green:#22c55e;
}

/* LIGHT MODE */
.light{
  --bg:#f1f5f9;
  --card:#ffffff;
  --text:#0f172a;
  --accent:#0284c7;
  --green:#16a34a;
}

body{
  margin:0;
  font-family:Poppins,sans-serif;
  background:var(--bg);
  color:var(--text);
  transition:.3s;
}

/* NAV */
nav{
  position:sticky;
  top:0;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 20px;
  backdrop-filter:blur(10px);
  background:rgba(0,0,0,.4);
}

nav h2{color:var(--accent);margin:0}

nav button{
  padding:8px 12px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:var(--accent);
  color:white;
}

/* GRID */
.container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:20px;
  padding:20px;
}

/* CARD */
.card{
  background:var(--card);
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 10px 30px rgba(0,0,0,.3);
}

.card img{
  width:100%;
  height:160px;
  object-fit:cover;
}

.content{padding:15px}

h2{color:var(--green);margin:0}

.meta{
  font-size:.8rem;
  opacity:.8;
}

/* COMMENTS */
.comments{
  margin-top:10px;
  border-top:1px solid rgba(255,255,255,0.1);
  padding-top:10px;
}

.comments input{
  width:70%;
  padding:6px;
  border-radius:6px;
  border:none;
  outline:none;
}

.comments button{
  padding:6px;
  border:none;
  border-radius:6px;
  background:var(--accent);
  color:white;
  cursor:pointer;
}

.comment-list{
  margin-top:8px;
  font-size:.8rem;
  max-height:80px;
  overflow:auto;
}

.comment{
  background:rgba(255,255,255,0.05);
  padding:5px;
  border-radius:6px;
  margin-bottom:5px;
}

</style>
</head>

<body>

<nav>
<h2>🎮 H&N Games</h2>
<button onclick="toggleTheme()">🌙 / ☀️</button>
</nav>

<div class="container">

<!-- FLAPPY -->
<div class="card" data-id="flappy">
<img src="https://programamos.es/web/wp-content/uploads/2016/10/flappybird.jpg">

<div class="content">
<h2>FlappyBird</h2>

<div class="meta">
👀 <span id="flappyV">0</span> · 📥 <span id="flappyD">0</span>
</div>

<!-- COMMENTS -->
<div class="comments">
<input id="flappyInput" placeholder="Escribe comentario...">
<button onclick="addComment('flappy')">+</button>
<div id="flappyC" class="comment-list"></div>
</div>

</div>
</div>

<!-- SPACE -->
<div class="card" data-id="space">
<img src="https://repository-images.githubusercontent.com/951086522/26f54ffb-8f82-4dab-8daa-ce5f9ccbf1f2">

<div class="content">
<h2>SpaceInvader</h2>

<div class="meta">
👀 <span id="spaceV">0</span> · 📥 <span id="spaceD">0</span>
</div>

<div class="comments">
<input id="spaceInput" placeholder="Escribe comentario...">
<button onclick="addComment('space')">+</button>
<div id="spaceC" class="comment-list"></div>
</div>

</div>
</div>

</div>

<script>

let games=["flappy","space"];

/* THEME */
function toggleTheme(){
document.body.classList.toggle("light");
}

/* VISITS + LOAD */
function init(){
games.forEach(g=>{
let v=localStorage.getItem(g+"_v")||0;
v++;
localStorage.setItem(g+"_v",v);

let d=localStorage.getItem(g+"_d")||0;

document.getElementById(g+"V").innerText=v;
document.getElementById(g+"D").innerText=d;

loadComments(g);
});
}

/* DOWNLOAD (opcional futuro) */
function download(id){
let d=localStorage.getItem(id+"_d")||0;
d++;
localStorage.setItem(id+"_d",d);
}

/* COMMENTS */
function addComment(game){
let input=document.getElementById(game+"Input");
let text=input.value.trim();
if(!text)return;

let comments=JSON.parse(localStorage.getItem(game+"_c")||"[]");
comments.push(text);
localStorage.setItem(game+"_c",JSON.stringify(comments));

input.value="";
loadComments(game);
}

function loadComments(game){
let box=document.getElementById(game+"C");
let comments=JSON.parse(localStorage.getItem(game+"_c")||"[]");

box.innerHTML="";

comments.forEach(c=>{
let div=document.createElement("div");
div.className="comment";
div.innerText=c;
box.appendChild(div);
});
}

init();

</script>

</body>
</html>
