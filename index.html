<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>H&N Games Hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0b1220;
  --card:rgba(30,41,59,0.6);
  --text:#e2e8f0;
  --accent:#38bdf8;
  --green:#22c55e;
}

body{
  margin:0;
  font-family:Poppins,sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* NAV */
nav{
  position:sticky;
  top:0;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 20px;
  backdrop-filter:blur(10px);
  background:rgba(0,0,0,.5);
  z-index:1000;
}

nav h2{color:var(--accent);margin:0}

nav input{
  padding:8px;
  border-radius:10px;
  border:none;
  outline:none;
  width:220px;
}

/* HEADER COMPACTO */
header{
  text-align:center;
  padding:20px 10px 10px;
}

header h1{
  margin:5px;
  font-size:1.8rem;
  color:var(--accent);
}

header p{
  margin:0;
  opacity:.7;
}

/* JUEGOS ARRIBA (FOCO PRINCIPAL) */
.container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
  padding:20px;
  max-width:1200px;
  margin:auto;
}

/* CARD */
.card{
  background:var(--card);
  border-radius:16px;
  overflow:hidden;
  transition:.3s;
  box-shadow:0 10px 30px rgba(0,0,0,.4);
}

.card:hover{
  transform:translateY(-8px) scale(1.02);
}

.card img{
  width:100%;
  height:170px;
  object-fit:cover;
}

.content{
  padding:15px;
}

h2{color:var(--green);margin:0}

.tag{
  display:inline-block;
  font-size:.7rem;
  background:var(--accent);
  padding:3px 8px;
  border-radius:8px;
  margin-bottom:5px;
}

.btn{
  display:inline-block;
  margin-top:8px;
  padding:8px 10px;
  border-radius:10px;
  text-decoration:none;
  color:white;
  font-size:.85rem;
}

.download{background:linear-gradient(135deg,#2563eb,#3b82f6)}
.github{background:linear-gradient(135deg,#0ea5e9,#06b6d4)}

.meta{
  font-size:.75rem;
  opacity:.8;
  margin-top:5px;
}

/* TOP BUTTON */
#topBtn{
  position:fixed;
  bottom:20px;
  right:20px;
  background:var(--accent);
  border:none;
  padding:10px;
  border-radius:50%;
  display:none;
  cursor:pointer;
}

/* FOOTER */
footer{
  text-align:center;
  padding:20px;
  opacity:.6;
}
</style>
</head>

<body>

<nav>
<h2>🎮 H&N Games</h2>
<input id="search" placeholder="Buscar juegos...">
</nav>

<header>
<h1>🔥 Juega ahora</h1>
<p>Todos los minijuegos directamente disponibles</p>
</header>

<!-- 🔥 JUEGOS PRIMERO (IMPORTANTE) -->
<div class="container">

<!-- FLAPPY -->
<div class="card" data-name="flappy arcade">
<img src="https://programamos.es/web/wp-content/uploads/2016/10/flappybird.jpg">
<div class="content">
<span class="tag">ARCADE</span>
<h2>FlappyBird</h2>

<a class="btn download" href="https://github.com/nmartin-elpuig/FlappyBird/releases/download/v1.0/FlappyBird-main.zip" onclick="add('flappy')">Descargar</a>
<a class="btn github" href="https://github.com/nmartin-elpuig/proyecto">GitHub</a>

<div class="meta">
📥 <span id="flappy">0</span> descargas
</div>
</div>
</div>

<!-- SPACE -->
<div class="card" data-name="space shooter">
<img src="https://repository-images.githubusercontent.com/951086522/26f54ffb-8f82-4dab-8daa-ce5f9ccbf1f2">
<div class="content">
<span class="tag">SPACE</span>
<h2>SpaceInvader</h2>

<a class="btn download" href="https://github.com/nmartin-elpuig/SpaceInvader/releases/download/V1.0/SpaceInvader-main.zip" onclick="add('space')">Descargar</a>
<a class="btn github" href="https://github.com/nmartin-elpuig/SpaceInvader">GitHub</a>

<div class="meta">
📥 <span id="space">0</span> descargas
</div>
</div>
</div>

<!-- JETPACK -->
<div class="card" data-name="jetpack arcade">
<img src="https://play-lh.googleusercontent.com/ombetvA16LmQb1_meog0znsCk4pKcpXA2iRyZLwP8FboxiVvWvufVmqSyLYz1YK4F1PyqZO9Q6AyrGP-kaFr=w526-h296-rw">
<div class="content">
<span class="tag">ARCADE</span>
<h2>Jetpack</h2>

<a class="btn download" href="https://github.com/nmartin-elpuig/Jetpack/releases/download/untagged-a71b8cefc69f74260e94/Jetpack-main.zip" onclick="add('jetpack')">Descargar</a>
<a class="btn github" href="https://github.com/nmartin-elpuig/Jetpack">GitHub</a>

<div class="meta">
📥 <span id="jetpack">0</span> descargas
</div>
</div>
</div>

<!-- COINDASH -->
<div class="card" data-name="coindash arcade">
<img src="imagenes/coindash.jpg">
<div class="content">
<span class="tag">ARCADE</span>
<h2>CoinDash</h2>

<a class="btn download" href="descargas/coindash.zip" onclick="add('coindash')">Descargar</a>
<a class="btn github" href="https://github.com/nmartin-elpuig/Coindash_H-N">GitHub</a>

<div class="meta">
📥 <span id="coindash">0</span> descargas
</div>
</div>
</div>

</div>

<button id="topBtn" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>


<script>

// downloads
function add(id){
let c=localStorage.getItem(id)||0;
c++;
localStorage.setItem(id,c);
document.getElementById(id).innerText=c;
}

// load
["flappy","space","jetpack","coindash"].forEach(i=>{
document.getElementById(i).innerText=localStorage.getItem(i)||0;
});

// search
document.getElementById("search").addEventListener("input",e=>{
let v=e.target.value.toLowerCase();
document.querySelectorAll(".card").forEach(c=>{
c.style.display=c.dataset.name.includes(v)?"block":"none";
});
});

// top button
let btn=document.getElementById("topBtn");
window.onscroll=()=>btn.style.display=scrollY>300?"block":"none";

</script>

</body>
</html>
