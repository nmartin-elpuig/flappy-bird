<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>H&N Games Hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0b1220;
  --card:#1e293b;
  --text:#e2e8f0;
  --accent:#38bdf8;
  --green:#22c55e;
}

.light{
  --bg:#f1f5f9;
  --card:#ffffff;
  --text:#0f172a;
  --accent:#0284c7;
  --green:#16a34a;
}

body{
  margin:0;
  font-family:Poppins,sans-serif;
  background:var(--bg);
  color:var(--text);
  transition:.3s;
}

/* NAV */
nav{
  position:sticky;
  top:0;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 20px;
  backdrop-filter:blur(10px);
  background:rgba(0,0,0,.4);
}

nav h2{color:var(--accent);margin:0}

nav button{
  padding:8px 12px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:var(--accent);
  color:white;
}

/* GRID */
.container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:20px;
  padding:20px;
}

/* CARD */
.card{
  background:var(--card);
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 10px 30px rgba(0,0,0,.3);
  transition:.3s;
}

.card:hover{
  transform:translateY(-6px);
}

.card img{
  width:100%;
  height:160px;
  object-fit:cover;
}

.content{padding:15px}

h2{color:var(--green);margin:0}

/* STATS */
.meta{
  font-size:.8rem;
  opacity:.8;
  margin-top:5px;
}

/* LIKE BUTTON */
.like-btn{
  background:none;
  border:none;
  font-size:1.2rem;
  cursor:pointer;
  color:var(--accent);
  margin-top:8px;
}

/* RANK */
.rank{
  font-size:.75rem;
  opacity:.7;
}

/* HEADER */
header{
  text-align:center;
  padding:15px;
}

header h1{
  color:var(--accent);
  margin:5px;
}
</style>
</head>

<body>

<nav>
<h2>🎮 H&N Games</h2>
<button onclick="toggleTheme()">🌙 / ☀️</button>
</nav>

<header>
<h1>🔥 Juegos disponibles</h1>
<p>Likea tus favoritos y compite en el ranking</p>
</header>

<div class="container">

<!-- FLAPPY -->
<div class="card" data-id="flappy">
<img src="https://programamos.es/web/wp-content/uploads/2016/10/flappybird.jpg">

<div class="content">
<h2>FlappyBird</h2>

<div class="meta">
👀 <span id="flappyV">0</span> · 👍 <span id="flappyL">0</span>
</div>

<button class="like-btn" onclick="like('flappy')">👍 Like</button>
<div class="rank" id="flappyR"></div>

</div>
</div>

<!-- SPACE -->
<div class="card" data-id="space">
<img src="https://repository-images.githubusercontent.com/951086522/26f54ffb-8f82-4dab-8daa-ce5f9ccbf1f2">

<div class="content">
<h2>SpaceInvader</h2>

<div class="meta">
👀 <span id="spaceV">0</span> · 👍 <span id="spaceL">0</span>
</div>

<button class="like-btn" onclick="like('space')">👍 Like</button>
<div class="rank" id="spaceR"></div>

</div>
</div>

<!-- JETPACK -->
<div class="card" data-id="jetpack">
<img src="https://play-lh.googleusercontent.com/ombetvA16LmQb1_meog0znsCk4pKcpXA2iRyZLwP8FboxiVvWvufVmqSyLYz1YK4F1PyqZO9Q6AyrGP-kaFr=w526-h296-rw">

<div class="content">
<h2>Jetpack</h2>

<div class="meta">
👀 <span id="jetpackV">0</span> · 👍 <span id="jetpackL">0</span>
</div>

<button class="like-btn" onclick="like('jetpack')">👍 Like</button>
<div class="rank" id="jetpackR"></div>

</div>
</div>

<!-- COINDASH -->
<div class="card" data-id="coindash">
<img src="imagenes/coindash.jpg">

<div class="content">
<h2>CoinDash</h2>

<div class="meta">
👀 <span id="coindashV">0</span> · 👍 <span id="coindashL">0</span>
</div>

<button class="like-btn" onclick="like('coindash')">👍 Like</button>
<div class="rank" id="coindashR"></div>

</div>
</div>

</div>

<script>

let games=["flappy","space","jetpack","coindash"];

/* VISITAS */
function addVisit(g){
let v=Number(localStorage.getItem(g+"_v")||0);
v++;
localStorage.setItem(g+"_v",v);
}

/* LIKES */
function like(g){
let l=Number(localStorage.getItem(g+"_l")||0);
l++;
localStorage.setItem(g+"_l",l);
update();
}

/* UPDATE UI + RANKING */
function update(){

let ranking=[];

games.forEach(g=>{
let v=Number(localStorage.getItem(g+"_v")||0);
let l=Number(localStorage.getItem(g+"_l")||0);

document.getElementById(g+"V").innerText=v;
document.getElementById(g+"L").innerText=l;

// score = likes + visitas
let score=v + l*2;

ranking.push({g,score});
});

// ordenar ranking
ranking.sort((a,b)=>b.score-a.score);

// mostrar ranking
ranking.forEach((r,i)=>{
document.getElementById(r.g+"R").innerText = "🏆 Posición: #" + (i+1);
});

}

/* THEME */
function toggleTheme(){
document.body.classList.toggle("light");
}

/* INIT */
games.forEach(g=>addVisit(g));
update();

</script>

</body>
</html>
